type: handcrafted
features:
  # Market (Spooner et al. 2018; Huang et al. 2015)
  - bid_ask_spread
  - midprice_move
  - queue_imbalance
  - signed_volume
  - realized_vol
  - rsi
  - lob_depth_bid_k_levels   # K=3 default
  - lob_depth_ask_k_levels
