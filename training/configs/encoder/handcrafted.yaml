  - inventory                # Spooner et al. 2018
  - active_bid_distance      # Spooner et al. 2018
  - active_ask_distance      # Spooner et al. 2018
  - outstanding_bid_price    # Sun et al. 2022
  - outstanding_ask_price    # Sun et al. 2022
  - trade_prices_last_T      # Patel 2018
  - cash                     # Patel 2018
  - time_remaining           # Gašperov survey 2021
  # Note: VPIN removed — not in reading notes
